# Style DNA — AI Learning Platform (Numerology + AI Education)
# Source: https://ai-990267211963.us-west1.run.app/
# Generated: 2026-04-12

meta:
  url: "https://ai-990267211963.us-west1.run.app/"
  title: "AI Learning Application — Numerology & AI Education"
  language: "ja / en"
  framework: "React 19.1.0"
  css_framework: "Tailwind CSS"

colors:
  primary_gradient: "from-pink-500 to-rose-500"
  secondary_gradient: "from-purple-100 via-pink-100 to-indigo-100"
  background_base: "#fdf4ff"  # fuchsia-50
  surface: "#ffffff"
  text_primary: "#1f2937"     # gray-800
  text_secondary: "#4b5563"   # gray-600
  text_muted: "#9ca3af"       # gray-400
  accent_purple: "#7c3aed"    # purple-600
  accent_purple_dark: "#6d28d9" # purple-700
  accent_pink: "#ec4899"      # pink-500
  accent_pink_dark: "#db2777" # pink-600
  accent_indigo: "#4f46e5"    # indigo-600
  accent_indigo_light: "#e0e7ff" # indigo-100
  cta: "linear-gradient(to right, #ec4899, #f43f5e)" # pink-500 to rose-500
  cta_hover: "linear-gradient(to right, #db2777, #e11d48)" # pink-600 to rose-600

typography:
  font_display: "'Lora', serif"
  font_body: "'Inter', system-ui, sans-serif"
  google_fonts: "Lora:wght@400;600;700&family=Inter:wght@400;500;600;700"
  scale:
    h1: "1.5rem / 700 / 1.3"       # text-2xl bold
    h2: "1.25rem / 700 / 1.35"     # text-xl bold
    h3: "1.125rem / 600 / 1.4"     # text-lg semibold
    body: "0.875rem / 400 / 1.6"   # text-sm (base 14px)
    small: "0.75rem / 400 / 1.5"   # text-xs
    caption: "0.625rem / 400 / 1.4"

spacing:
  unit: "4px"
  section_gap: "2rem"
  container_max: "28rem"   # max-w-md (mobile-first app)
  container_padding: "1rem"
  card_padding: "1.5rem"
  border_radius_card: "0.75rem"  # rounded-xl
  border_radius_button: "0.75rem"
  border_radius_input: "0.5rem"  # rounded-lg

layout:
  type: "single-column mobile-first"
  grid: "grid-cols-1 sm:grid-cols-2"
  breakpoints:
    sm: "640px"
    md: "768px"
    lg: "1024px"

components:
  buttons:
    primary: "bg-gradient-to-r from-pink-500 to-rose-500 text-white rounded-xl px-6 py-3 font-semibold shadow-lg"
    secondary: "bg-purple-100 text-purple-700 rounded-xl px-4 py-2 font-medium"
    ghost: "text-gray-600 hover:text-gray-800"
  cards:
    base: "bg-white rounded-xl shadow-md p-6"
    gradient: "bg-gradient-to-br from-purple-100 via-pink-100 to-indigo-100 rounded-xl p-6"
    glass: "bg-white/80 backdrop-blur-sm rounded-xl p-4"
  inputs:
    base: "border border-gray-200 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-pink-300 focus:border-pink-400"
  badges:
    xp: "bg-yellow-100 text-yellow-700 rounded-full px-3 py-1 text-xs font-semibold"
    level: "bg-purple-100 text-purple-700 rounded-full px-3 py-1 text-xs font-semibold"

effects:
  shadow_card: "0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05)"
  shadow_button: "0 10px 15px -3px rgba(236,72,153,0.3)"
  transition: "all 0.2s ease"
  gradient_bg: "linear-gradient(135deg, #f3e8ff, #fce7f3, #e0e7ff)"

features:
  learning_modules:
    - human_relations_plan
    - finance_learning
    - prompt_engineering_basics
    - image_generation_advanced
    - text_summarization
    - ai_ethics
    - ai_in_business
    - creative_writing
  gamification:
    xp_correct: 25
    xp_incorrect: 5
    xp_level_clear: 100
    max_level: 10
    max_xp: 4000
  ai_integration:
    model: "gemini-2.5-flash"
    image_model: "imagen-3.0-generate-002"
  i18n:
    - ja
    - en
